<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<title>VitaMate — Design Canvas</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Kanit:ital,wght@0,200;0,300;0,400;0,500;0,600;1,200;1,300;1,400;1,500&family=Prompt:wght@200;300;400;500;600&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  html, body { margin:0; padding:0; height:100%; background:#f0eee9; }
  * { box-sizing: border-box; }
  body { font-family: Prompt, 'IBM Plex Sans Thai', Inter, system-ui, sans-serif; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  #root { width:100%; height:100%; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="screens/Tokens.jsx"></script>
<script type="text/babel" src="screens/Landing.jsx"></script>
<script type="text/babel" src="screens/Dashboard.jsx"></script>
<script type="text/babel" src="screens/Recommendations.jsx"></script>
<script type="text/babel" src="screens/Modal.jsx"></script>
<script type="text/babel" src="screens/DashboardMobile.jsx"></script>

<script type="text/babel" data-presets="react">
  const App = () => (
    <DesignCanvas>
      <DCSection id="vitamate" title="VitaMate · สำหรับผู้ใช้ไทย"
        subtitle="หน้าจอประสบการณ์จริง· บทสนทนาไทยกับ Vita เป็นหัวใจ· โทนสีเสจและอินทรีย์"
>

        <DCArtboard id="landing" label="01 · Landing"
          width={1280} height={900}>
          <LandingPage/>
        </DCArtboard>

        <DCArtboard id="dashboard" label="02 · Main dashboard"
          width={1280} height={900}>
          <DashboardPage/>
        </DCArtboard>

        <DCArtboard id="recommendations" label="03 · AI recommendations"
          width={1280} height={900}>
          <RecommendationsPage/>
        </DCArtboard>

        <DCArtboard id="modal" label="04 · Daily input modal"
          width={1280} height={900}>
          <ModalPage/>
        </DCArtboard>

        <DCArtboard id="mobile" label="05 · Mobile dashboard"
          width={460} height={920}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', width: '100%', height: '100%' }}>
            <IOSDevice width={402} height={874}>
              <MobileDashboard/>
            </IOSDevice>
          </div>
        </DCArtboard>

      </DCSection>
    </DesignCanvas>
  );

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
